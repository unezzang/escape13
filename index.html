# escape13
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>환자 13번</title>

<style>
body {
  margin:0;
  background:black;
  color:#00ff9f;
  font-family:monospace;
  text-align:center;
}

.screen {
  display:none;
  padding:30px;
}

.active { display:block; }

button, input {
  padding:12px;
  margin:10px;
  background:black;
  color:#00ff9f;
  border:1px solid #00ff9f;
  width:80%;
  font-size:16px;
}

#glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% {opacity:1;}
  50% {opacity:0.3;}
  100% {opacity:1;}
}

#timer {
  position:fixed;
  top:10px;
  right:10px;
  color:red;
}
</style>
</head>

<body>

<div id="timer">60:00</div>

<!-- 시작 -->
<div id="start" class="screen active">
  <h1 id="glitch">환자 13번</h1>
  <p>폐병원에 입장하시겠습니까?</p>
  <button onclick="startGame()">입장</button>
</div>

<!-- 1단계 -->
<div id="stage1" class="screen">
  <p>전화번호 입력 (힌트: 13)</p>
  <input id="code1">
  <button onclick="check1()">확인</button>
</div>

<!-- 2단계 -->
<div id="stage2" class="screen">
  <p>벽에 적힌 숫자 입력</p>
  <input id="code2">
  <button onclick="check2()">확인</button>
</div>

<!-- 3단계 -->
<div id="stage3" class="screen">
  <p>실험실 코드 (404)</p>
  <input id="code3">
  <button onclick="check3()">확인</button>
</div>

<!-- 엔딩 -->
<div id="ending" class="screen">
  <h1>환자 13번 확인됨</h1>
  <p id="name"></p>
</div>

<audio id="sound1" src="https://www.myinstants.com/media/sounds/creepy.mp3"></audio>
<audio id="sound2" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>

<script>
let time = 3600;

function startGame(){
  switchScreen("stage1");
  startTimer();
  vibrate();
}

function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function startTimer(){
  setInterval(()=>{
    time--;
    let m = Math.floor(time/60);
    let s = time%60;
    document.getElementById("timer").innerText = m+":"+(s<10?"0"+s:s);

    if(time==3500){
      scare();
    }

  },1000);
}

function scare(){
  document.body.style.background="white";
  document.getElementById("sound2").play();
  setTimeout(()=>{document.body.style.background="black"},200);
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }
}

function check1(){
  if(code1.value=="13"){
    switchScreen("stage2");
    document.getElementById("sound1").play();
    vibrate();
  } else {
    scare();
  }
}

function check2(){
  if(code2.value=="1313"){
    switchScreen("stage3");
    scare();
  } else {
    vibrate();
  }
}

function check3(){
  if(code3.value=="404"){
    let user = prompt("이름 입력");
    document.getElementById("name").innerText = user + " = 환자 13번";
    switchScreen("ending");
    document.getElementById("sound2").play();
    scare();
  } else {
    scare();
  }
}
</script>

</body>
</html>
